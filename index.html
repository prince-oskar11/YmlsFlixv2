<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUIXY - Juice & Dessert</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  nav { margin-bottom: 20px; }
  nav span { margin-right: 20px; cursor: pointer; font-weight: bold; color: green; }
  section { display: none; }
  section.active { display: block; }
  .item { display: flex; align-items: center; margin-bottom: 10px; }
  .itemName { width: 150px; }
  .counter { width: 50px; text-align: center; font-weight: bold; }
  button { margin: 0 5px; }
</style>
<script>
  const juices = {};
  const desserts = {};

  function showSection(sectionId) {
    document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(sectionId).classList.add('active');
  }

  // Juice functions
  function addJuice() {
    const name = document.getElementById('juiceName').value.trim();
    if (!name || juices[name]) { alert('Enter a valid and new juice name'); return; }
    juices[name] = 0;
    document.getElementById('juiceName').value = '';
    displayJuice();
  }

  function displayJuice() {
    const container = document.getElementById('juiceItems');
    container.innerHTML = '';
    for (const name in juices) {
      const div = document.createElement('div');
      div.className = 'item';

      const n = document.createElement('span');
      n.className = 'itemName';
      n.innerText = name;

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => {
        if (juices[name] > 0) { juices[name]--; displayJuice(); }
      };

      const countSpan = document.createElement('span');
      countSpan.className = 'counter';
      countSpan.innerText = juices[name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { juices[name]++; displayJuice(); };

      div.appendChild(n);
      div.appendChild(minusBtn);
      div.appendChild(countSpan);
      div.appendChild(plusBtn);
      container.appendChild(div);
    }
  }

  // Dessert functions
  function addDessert() {
    const name = document.getElementById('dessertName').value.trim();
    if (!name || desserts[name]) { alert('Enter a valid and new dessert name'); return; }
    desserts[name] = 0;
    document.getElementById('dessertName').value = '';
    displayDessert();
  }

  function displayDessert() {
    const container = document.getElementById('dessertItems');
    container.innerHTML = '';
    for (const name in desserts) {
      const div = document.createElement('div');
      div.className = 'item';

      const n = document.createElement('span');
      n.className = 'itemName';
      n.innerText = name;

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => {
        if (desserts[name] > 0) { desserts[name]--; displayDessert(); }
      };

      const countSpan = document.createElement('span');
      countSpan.className = 'counter';
      countSpan.innerText = desserts[name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { desserts[name]++; displayDessert(); };

      div.appendChild(n);
      div.appendChild(minusBtn);
      div.appendChild(countSpan);
      div.appendChild(plusBtn);
      container.appendChild(div);
    }
  }

  function updateSummary() {
    const summary = document.getElementById('summary');
    summary.innerHTML = '';

    for (const name in juices) {
      const p = document.createElement('p');
      p.innerText = `Juice - ${name}: ${juices[name]} sold`;
      summary.appendChild(p);
    }
    for (const name in desserts) {
      const p = document.createElement('p');
      p.innerText = `Dessert - ${name}: ${desserts[name]} sold`;
      summary.appendChild(p);
    }
  }

  window.onload = () => {
    showSection('juiceSection');
  };
</script>
</head>
<body>

<h1>JUIXY - Juice & Dessert</h1>
<nav>
  <span onclick="showSection('juiceSection')">Juice</span>
  <span onclick="showSection('dessertSection')">Desserts</span>
</nav>

<!-- Juice Section -->
<section id="juiceSection" class="active">
  <h2>Add New Juice</h2>
  <input type="text" id="juiceName" placeholder="Enter juice name" />
  <button onclick="addJuice()">Add Juice</button>
  <h3>Juice List</h3>
  <div id="juiceItems"></div>
</section>

<!-- Dessert Section -->
<section id="dessertSection">
  <h2>Add New Dessert</h2>
  <input type="text" id="dessertName" placeholder="Enter dessert name" />
  <button onclick="addDessert()">Add Dessert</button>
  <h3>Dessert List</h3>
  <div id="dessertItems"></div>
</section>

<h2>Sales Summary</h2>
<div id="summary"></div>

<script>
  // Toggle sections
  function showSection(id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>

</body>
</html>
