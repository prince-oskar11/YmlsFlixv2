<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUIXY - Juice & Dessert App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background-color: #f5deb3; /* beige background for entire app */
  }
  /* Header styles */
  #header {
    background-color: #f5deb3; /* beige background for JUIXY title background */
    padding: 20px;
    text-align: center;
    position: relative;
  }
  #header h1 {
    margin: 0;
    font-size: 36px;
    color: beige; /* change to beige */
  }
  /* Top buttons container */
  #topButtons {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex; justify-content: space-between; padding: 0 20px;
  }
  #topButtons button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  #stockBtn { background-color: #2196F3; color: white; }
  #clearBtn { background-color: #f44336; color: white; }

  /* Navigation styles */
  #nav {
    display: flex; justify-content: center; gap: 15px; margin-top: 10px; background:#e0e0e0; padding:10px 0;
  }
  #nav span {
    cursor: pointer; font-weight: bold; color: green; font-size: 18px; padding: 8px 12px; border-radius: 4px; transition: background 0.3s;
  }
  #nav span:hover { background-color: #c8e6c9; }
  /* Main content style */
  section {
    display: none;
    max-width: 800px; margin:20px auto; background: #fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  section.active { display: block; }
  /* Section headers in brown */
  h2 {
    color: brown;
    margin-top: 0;
  }
  /* Items list styles */
  .item { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .itemName { flex: 1; font-size: 16px; }
  .stockLevel { margin-left: 10px; font-weight: bold; color: #555; }
  .counter { width: 50px; text-align: center; font-weight: bold; }
  button { margin: 0 5px; padding: 4px 8px; border: none; border-radius: 4px; cursor:pointer; background-color: #4CAF50; color: white; font-weight: bold; }
  button:hover { background-color: #45a049; }
  /* Delete button style */
  .deleteBtn {
    background-color: #f44336; /* red */
    color: white;
    padding: 2px 6px;
    border: none;
    border-radius: 50%;
    font-weight: bold;
    margin-left: 10px;
    cursor: pointer;
  }
  /* Add item input styles */
  .addSection {
    margin-bottom: 15px;
  }
  .addSection input {
    padding: 8px; width: 200px; margin-right: 10px; border: 1px solid #ccc; border-radius:4px;
  }
  .addSection button {
    padding: 8px 12px; background-color: #2196F3; color: white; border: none; border-radius:4px; cursor:pointer;
  }
  .addSection button:hover { background-color: #0b7dda; }
  /* Stock management page styles */
  #stockPage {
    display: none;
    max-width: 800px; margin:20px auto; background: #fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  #stockPage.active { display: block; }
  #stockPage h2 { margin-top: 0; }
  /* Stock item list styles in stock page */
  .stockItem { display: flex; align-items: center; margin-bottom: 10px; }
  .stockItem span { flex: 1; }
</style>
<script>
  // Initialize data storage
  let dataSections = {
    'Juice': {},
    'Milk-Cake': {},
    'Tiramisu': {},
    'Matcha': {},
    'Mojito': {},
    'Sandwich': {} // add Sandwich section
  };

  // Load data from localStorage
  for (let key in dataSections) {
    dataSections[key] = JSON.parse(localStorage.getItem(key)) || {};
  }
  let stockData = JSON.parse(localStorage.getItem('Stock')) || {};

  function saveData() {
    for (let section in dataSections) {
      localStorage.setItem(section, JSON.stringify(dataSections[section]));
    }
    localStorage.setItem('Stock', JSON.stringify(stockData));
  }

  function showSection(id) {
    document.querySelectorAll('section, #stockPage').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Add new item
  function addItem(section, inputId) {
    const name = document.getElementById(inputId).value.trim();
    if (!name || dataSections[section][name]) {
      alert('Enter a valid and new item name');
      return;
    }
    dataSections[section][name] = 0;
    document.getElementById(inputId).value = '';
    displayItems(section);
    updateSummary();
    saveData();
  }

  // Display items
  function displayItems(section) {
    const container = document.getElementById('itemsContainer_' + section);
    if (!container) return;
    container.innerHTML = '';
    for (const name in dataSections[section]) {
      const div = document.createElement('div');
      div.className = 'item';

      const n = document.createElement('span');
      n.className = 'itemName';
      n.innerText = name;

      const stockCount = stockData[name] || 0;
      const stockSpan = document.createElement('span');
      stockSpan.className = 'stockLevel';
      stockSpan.innerText = `Stock: ${stockCount}`;

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => { if (dataSections[section][name] > 0) { dataSections[section][name]--; displayItems(section); updateSummary(); saveData(); } };

      const countSpan = document.createElement('span');
      countSpan.className = 'counter';
      countSpan.innerText = dataSections[section][name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { dataSections[section][name]++; displayItems(section); updateSummary(); saveData(); };

      // delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = 'X';
      deleteBtn.className = 'deleteBtn';
      deleteBtn.onclick = () => {
        if (confirm('Are you sure you want to delete "' + name + '"?')) {
          delete dataSections[section][name];
          delete stockData[name]; // remove stock info when item is deleted
          displayItems(section);
          updateSummary();
          saveData();
        }
      };

      div.appendChild(n);
      div.appendChild(stockSpan);
      div.appendChild(minusBtn);
      div.appendChild(countSpan);
      div.appendChild(plusBtn);
      div.appendChild(deleteBtn);
      container.appendChild(div);
    }
  }

  function updateSummary() {
    // optional: implement if needed
  }

  function resetCounts() {
    if (confirm('Are you sure you want to reset all counts to zero?')) {
      for (let section in dataSections) {
        for (let item in dataSections[section]) {
          dataSections[section][item] = 0;
        }
        displayItems(section);
      }
      saveData();
    }
  }

  function showTopSaler() {
    let totalSales = {};
    for (let section in dataSections) {
      for (const name in dataSections[section]) {
        totalSales[name] = (totalSales[name] || 0) + dataSections[section][name];
      }
    }
    const sortedItems = Object.entries(totalSales).sort((a, b) => b[1] - a[1]);
    let msg = 'Items sold (highest to lowest):\n';
    for (const [name, count] of sortedItems) {
      msg += `${name}: ${count}\n`;
    }
    alert(msg);
  }

  function openStockPage() {
    showSection('stockPage');
    displayStockItems();
  }

  function displayStockItems() {
    const container = document.getElementById('stockItems');
    container.innerHTML = '';
    for (const name in stockData) {
      const div = document.createElement('div');
      div.className = 'stockItem';

      const nameSpan = document.createElement('span');
      nameSpan.innerText = name;

      const qtySpan = document.createElement('span');
      qtySpan.innerText = 'Stock: ' + stockData[name];

      // add +/- buttons
      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => {
        if (stockData[name] > 0) { stockData[name]--; saveData(); displayStockItems(); }
      };

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { stockData[name]++; saveData(); displayStockItems(); };

      // delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = 'X';
      deleteBtn.className = 'deleteBtn';
      deleteBtn.onclick = () => {
        if (confirm('Delete stock for ' + name + '?')) {
          delete stockData[name];
          saveData();
          displayStockItems();
        }
      };

      div.appendChild(nameSpan);
      div.appendChild(qtySpan);
      div.appendChild(minusBtn);
      div.appendChild(plusBtn);
      div.appendChild(deleteBtn);
      document.getElementById('stockItems').appendChild(div);
    }
  }

  window.onload = () => {
    for (let section in dataSections) {
      displayItems(section);
    }
  };
</script>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1 style="margin:0; color:#f5deb3;">JUIXY</h1>
  <div id="topButtons" style="position:absolute; top:20px; width:100%; display:flex; justify-content:space-between; padding:0 20px;">
    <button id="stockBtn" onclick="openStockPage()">Stock</button>
    <button id="clearBtn" onclick="resetCounts()">Clear Counts</button>
  </div>
</div>

<!-- Navigation menu -->
<div id="nav">
  <span onclick="showSection('Juice')">Juice</span>
  <span onclick="showSection('Milk-Cake')">Milk-Cake</span>
  <span onclick="showSection('Tiramisu')">Tiramisu</span>
  <span onclick="showSection('Matcha')">Matcha</span>
  <span onclick="showSection('Mojito')">Mojito</span>
  <span style="cursor:pointer; font-weight:bold; color:green;" onclick="showSection('stockPage')">Stock Management</span>
  <span style="cursor:pointer; font-weight:bold; color:green;" onclick="showSection('TopSaler')">Top Seller</span>
</div>

<!-- Main categories -->
<section id="Juice" class="active">
  <h2>Add New Juice</h2>
  <div class="addSection">
    <input type="text" id="juiceInput" placeholder="Enter juice name" />
    <button onclick="addItem('Juice', 'juiceInput')">Add Juice</button>
  </div>
  <h3>Juice List</h3>
  <div id="itemsContainer_Juice"></div>
</section>

<section id="Milk-Cake">

  </div>
  <h3>Milk-Cake List</h3>
  <div id="itemsContainer_Milk-Cake"></div>
</section>

<section id="Tiramisu">

    <input type="text" id="tiramisuInput" placeholder="Enter Tiramisu name" />
    <button onclick="addItem('Tiramisu', 'tiramisuInput')">Add Tiramisu</button>
  </div>
  <h3>Tiramisu List</h3>
  <div id="itemsContainer_Tiramisu"></div>
</section>

<section id="Matcha">
  <h2>Add New Matcha</h2>
  <div class="addSection">
    <input type="text" id="matchaInput" placeholder="Enter Matcha name" />
    <button onclick="addItem('Matcha', 'matchaInput')">Add Matcha</button>
  </div>
  <h3>Matcha List</h3>
  <div id="itemsContainer_Matcha"></div>
</section>

<section id="Mojito">
  <h2>Add New Mojito</h2>
  <div class="addSection">
    <input type="text" id="mojitoInput" placeholder="Enter Mojito name" />
    <button onclick="addItem('Mojito', 'mojitoInput')">Add Mojito</button>
  </div>
  <h3>Mojito List</h3>
  <div id="itemsContainer_Mojito"></div>
</section>

<!-- Stock Management Page -->
<section id="stockPage">
  <h2>Stock Management</h2>
  <div id="stockItems"></div>
  <button onclick="showSection('Juice')">Back to Categories</button>
</section>

<!-- Top Seller Page -->
<section id="TopSaler">
  <h2>Top Seller</h2>
  <pre id="topSalerDetails" style="white-space: pre-wrap;"></pre>
  <button onclick="showSection('Juice')">Back to Categories</button>
</section>

</body>
</html>
