<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YmlAnime</title>
<link rel="manifest" href="manifest.json" />
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #222;
    color: #fff;
  }
  header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #111;
    position: sticky;
    top: 0;
    z-index: 999;
  }
  .icon {
    margin: 0 10px;
    cursor: pointer;
    font-size: 20px;
  }
  #search-container {
    flex: 1;
    display: flex;
    align-items: center;
  }
  #search-input {
    width: 60%;
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
  }
  #install-btn {
    margin-left: 10px;
    padding: 5px 10px;
    background-color: #4CAF50;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  main {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
  }
  .poster {
    position: relative;
    width: 200px;
    margin: 10px;
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    background: #333;
  }
  .poster img {
    width: 100%;
    display: block;
  }
  .poster-info {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #fff;
  }
  .heart {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 20px;
    cursor: pointer;
  }
  .bottom-left {
    position: absolute;
    bottom: 8px;
    left: 8px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
  }
  /* Modal styles */
  .modal {
    display: none;
    position: fixed;
    z-index: 9999;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
  }
  .modal-content {
    background: #222;
    padding: 20px;
    border-radius: 8px;
    max-width: 600px;
    width: 90%;
  }
  #video-player {
    width: 100%;
    max-height: 70vh;
  }
  button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 4px;
    background-color: #4CAF50;
    cursor: pointer;
  }
  #profile-section {
    display: flex;
    flex-direction: column;
  }
  #profile-section input {
    margin: 5px 0;
    padding: 5px;
  }
</style>
</head>
<body>

<header>
  <div class="icon" id="home-btn" title="Home">🏠</div>
  <div class="icon" id="wishlist-btn" title="Wishlist">❤️</div>
  <div class="icon" id="genres-btn" title="Genres">🎞️</div>
  <div id="search-container">
    <input type="text" id="search-input" placeholder="YmlAnime..." />
    <button id="install-btn">Install</button>
  </div>
  <div class="icon" id="profile-btn" title="Profile">👤</div>
</header>

<main id="shows-container">
  <!-- Shows will load here -->
</main>

<!-- Trailer Modal -->
<div id="trailer-modal" class="modal">
  <div class="modal-content">
    <video id="video-player" controls autoplay></video>
    <br />
    <button id="close-trailer">Close</button>
  </div>
</div>

<!-- Wishlist Modal -->
<div id="wishlist-modal" class="modal">
  <div class="modal-content">
    <h3>Add to Wishlist</h3>
    <p id="wishlist-show-title"></p>
    <button id="add-wishlist">Add</button>
    <button id="cancel-wishlist">Cancel</button>
  </div>
</div>

<!-- Profile Modal -->
<div id="profile-modal" class="modal">
  <div class="modal-content" id="profile-content">
    <div id="sign-in-section">
      <h3>Sign In</h3>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" />
      <button id="sign-in-btn">Sign In</button>
    </div>
    <div id="profile-actions" style="display:none;">
      <h3>Profile</h3>
      <button id="sign-out-btn">Sign Out</button>
      <button id="clear-history">Clear History</button>
    </div>
  </div>
</div>

<script>
  // Sample data for shows
  const shows = [
    {
      id: 1,
      title: "Attack on Titan",
      episodes: 75,
      rating: 9.0,
      age: "16+",
      subDub: "Sub",
      trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
      streams: ["Filemoon", "StreamSB", "Mp4Upload", "DoodStream"],
      mostRated: true,
      backgroundUrl: "https://images.alphacoders.com/123/12345.jpg"
    },
    {
      id: 2,
      title: "My Hero Academia",
      episodes: 88,
      rating: 8.5,
      age: "13+",
      subDub: "Dub",
      trailer: "https://www.w3schools.com/html/movie.mp4",
      streams: ["Filemoon", "StreamSB"],
      mostRated: false,
      backgroundUrl: "https://images.alphacoders.com/543/54321.jpg"
    },
    {
      id: 3,
      title: "One Piece",
      episodes: 1000,
      rating: 9.2,
      age: "13+",
      subDub: "Dub",
      trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
      streams: ["Filemoon", "DoodStream"],
      mostRated: false,
      backgroundUrl: "https://images.alphacoders.com/234/23456.jpg"
    }
  ];

  const showsContainer = document.getElementById('shows-container');

  function loadShows(showsToLoad) {
    showsContainer.innerHTML = '';
    showsToLoad.forEach(show => {
      const div = document.createElement('div');
      div.className = 'poster';
      div.dataset.id = show.id;
      div.dataset.title = show.title;
      div.dataset.trailer = show.trailer;
      div.dataset.subtitle = show.subDub;
      div.dataset.streams = show.streams.join(',');
      div.dataset.background = show.backgroundUrl;
      div.innerHTML = `
        <img src="${show.backgroundUrl}" alt="${show.title}" />
        <div class="poster-info">
          <div>Ep: ${show.episodes}</div>
          <div>Rating: ${show.rating}</div>
          <div>${show.age}</div>
        </div>
        <div class="heart">🤍</div>
        <div class="bottom-left">
          <div>MostRated: ${show.mostRated}</div>
          <div>Age: ${show.age}</div>
        </div>
      `;
      // Click to show options
      div.addEventListener('click', () => {
        showOptions(show);
      });
      // Heart click
      div.querySelector('.heart').addEventListener('click', (e) => {
        e.stopPropagation();
        toggleWishlist(show.id, e.target);
      });
      showsContainer.appendChild(div);
    });
    // Change background based on most rated
    updateBackground(showsToLoad);
  }

  function updateBackground(shows) {
    const mostRatedShow = shows.find(s => s.mostRated);
    document.body.style.backgroundImage = mostRatedShow
      ? `url(${mostRatedShow.backgroundUrl})`
      : 'none';
    document.body.style.backgroundSize = 'cover';
  }

  function showOptions(show) {
    if (confirm(`Watch trailer for ${show.title}?`)) {
      playTrailer(show.trailer);
    }
  }

  function playTrailer(src) {
    document.getElementById('video-player').src = src;
    document.getElementById('trailer-modal').style.display = 'flex';
  }

  document.getElementById('close-trailer').onclick = () => {
    document.getElementById('trailer-modal').style.display = 'none';
  };

  function toggleWishlist(id, icon) {
    let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
    if (wishlist.includes(id)) {
      wishlist = wishlist.filter(i => i !== id);
      icon.innerHTML = '🤍';
    } else {
      wishlist.push(id);
      icon.innerHTML = '❤️';
    }
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
  }

  // Search
  document.getElementById('search-input').oninput = () => {
    const q = document.getElementById('search-input').value.toLowerCase();
    document.querySelectorAll('.poster').forEach(p => {
      const title = p.dataset.title.toLowerCase();
      p.style.display = title.includes(q) ? 'block' : 'none';
    });
  };

  // Load all shows initially
  window.onload = () => {
    loadShows(shows);
    // Profile login status
    if (localStorage.getItem('user')) {
      document.getElementById('profile-content').querySelector('#sign-in-section').style.display = 'none';
      document.getElementById('profile-content').querySelector('#profile-actions').style.display = 'block';
    }
  };

  // Profile sign in/out
  document.getElementById('profile-btn').onclick = () => {
    document.getElementById('profile-modal').style.display = 'flex';
  };

  document.getElementById('sign-in-btn').onclick = () => {
    const username = document.getElementById('username').value;
    if (username) {
      localStorage.setItem('user', username);
      document.getElementById('profile-modal').style.display = 'none';
      document.getElementById('profile-content').querySelector('#sign-in-section').style.display = 'none';
      document.getElementById('profile-content').querySelector('#profile-actions').style.display = 'block';
    }
  };

  document.getElementById('sign-out-btn').onclick = () => {
    localStorage.removeItem('user');
    document.getElementById('profile-modal').style.display = 'none';
    document.getElementById('profile-content').querySelector('#sign-in-section').style.display = 'block';
    document.getElementById('profile-content').querySelector('#profile-actions').style.display = 'none';
  };

  document.getElementById('clear-history').onclick = () => {
    if (confirm('Clear watch history?')) {
      localStorage.removeItem('history');
    }
  };

</script>
<script>
  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
