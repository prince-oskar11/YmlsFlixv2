<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YmlAnime</title>
<link rel="manifest" href="manifest.json">
<style>
  body { margin:0; font-family:sans-serif; background:#000; color:#fff; }
  header { display:flex; justify-content:space-between; align-items:center; padding:1rem; background:#111; flex-wrap:wrap; }
  header h1 { color:#00ff88; margin:0; }
  input { padding:0.5rem; width:40%; margin-left:1rem; border-radius:4px; border:none; margin-top:0.5rem; }
  #installBtn { padding:0.5rem 1rem; background:#00ff88; color:#000; border:none; border-radius:4px; cursor:pointer; margin-top:0.5rem; }
  nav { display:flex; gap:1rem; flex-wrap:wrap; margin-top:0.5rem; }
  nav button { background:#111; border:1px solid #00ff88; color:#00ff88; padding:0.3rem 0.7rem; border-radius:4px; cursor:pointer; }
  .section { padding:1rem; }
  .cards { display:flex; flex-wrap:wrap; gap:0.5rem; }
  .card { position:relative; cursor:pointer; width:150px; }
  .card img { width:100%; border-radius:6px; display:block; }
  .badge { position:absolute; background:#00ff88; color:#000; padding:2px 4px; font-size:12px; border-radius:3px; }
  .top-left { top:5px; left:5px; }
  .bottom-left { bottom:5px; left:5px; }
  .bottom-right { bottom:5px; right:5px; }
  .heart { position:absolute; top:5px; right:5px; font-size:16px; cursor:pointer; }
  .trailer-btn { position:absolute; bottom:25px; right:5px; background:#000; color:#00ff88; border:none; padding:2px 4px; font-size:12px; border-radius:3px; cursor:pointer; }
  #trailerModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; }
  #trailerModal iframe { width:80%; height:60%; }
  #trailerModal button { position:absolute; top:10px; right:10px; background:#00ff88; border:none; color:#000; padding:5px 10px; cursor:pointer; }
</style>
</head>
<body>

<header>
  <h1>YmlAnime</h1>
  <input type="text" id="search" placeholder="Search anime...">
  <button id="installBtn">Install App</button>
  <nav>
    <button data-section="mostRated">Most Rated</button>
    <button data-section="trending">Trending</button>
    <button data-section="airingNow">Airing Now</button>
    <button data-section="upcoming">Upcoming</button>
    <button data-section="continue">Continue Watching</button>
    <button data-section="wishlist">Wishlist</button>
  </nav>
</header>

<div class="section" id="home">
  <div class="cards" id="cards"></div>
</div>

<!-- Trailer Modal -->
<div id="trailerModal">
  <button id="closeTrailer">Close</button>
  <iframe src="" frameborder="0" allowfullscreen></iframe>
</div>

<script>
  // PWA Install
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'inline';
  });
  installBtn.addEventListener('click', () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => deferredPrompt = null);
    }
  });

  // Sample Anime Data
  const animeData = {
    mostRated: [
      { id:1,title:'Attack on Titan',ep:75,score:9.2,rating:'R',img:'https://cdn.myanimelist.net/images/anime/10/47347.jpg',trailer:'https://www.youtube.com/embed/MGRm4IzK1SQ' },
      { id:2,title:'Fullmetal Alchemist',ep:64,score:9.1,rating:'PG-13',img:'https://cdn.myanimelist.net/images/anime/1213/96541.jpg',trailer:'https://www.youtube.com/embed/1W3tF0STQ0Q' }
    ],
    trending: [
      { id:3,title:'Jujutsu Kaisen',ep:24,score:8.7,rating:'PG-13',img:'https://cdn.myanimelist.net/images/anime/1171/109222.jpg',trailer:'https://www.youtube.com/embed/cxHNbjss2Ms' }
    ],
    airingNow: [
      { id:4,title:'Chainsaw Man',ep:12,score:8.8,rating:'R',img:'https://cdn.myanimelist.net/images/anime/1939/136859.jpg',trailer:'https://www.youtube.com/embed/IsvMlXN1Pv0' }
    ],
    upcoming: [
      { id:5,title:'Spy x Family S2',ep:0,score:0,rating:'PG-13',img:'https://cdn.myanimelist.net/images/anime/1231/134241.jpg',trailer:'https://www.youtube.com/embed/Oq0FieO9i3A' }
    ]
  };

  // LocalStorage
  let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
  let continueWatching = JSON.parse(localStorage.getItem('continueWatching') || '[]');

  const cardsDiv = document.getElementById('cards');
  let currentSection = 'mostRated';

  function renderCards(list){
    cardsDiv.innerHTML = '';
    list.forEach(a=>{
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`
        <img src="${a.img}" alt="${a.title}">
        <span class="badge top-left">EP ${a.ep||'0'}</span>
        <span class="badge bottom-left">⭐ ${a.score||'N/A'}</span>
        <span class="badge bottom-right">${a.rating||'N/A'}</span>
        <span class="heart">${wishlist.includes(a.id)?'💚':'🤍'}</span>
        <button class="trailer-btn">Trailer</button>
      `;
      // Wishlist toggle
      card.querySelector('.heart').addEventListener('click',e=>{
        e.stopPropagation();
        if(wishlist.includes(a.id)) wishlist=wishlist.filter(id=>id!==a.id);
        else wishlist.push(a.id);
        localStorage.setItem('wishlist',JSON.stringify(wishlist));
        renderCards(list);
      });
      // Trailer
      card.querySelector('.trailer-btn').addEventListener('click',e=>{
        e.stopPropagation();
        const modal=document.getElementById('trailerModal');
        modal.querySelector('iframe').src=a.trailer;
        modal.style.display='flex';
      });
      // Continue watching
      card.addEventListener('click',()=>{
        if(!continueWatching.find(c=>c.id===a.id)) continueWatching.push({id:a.id,title:a.title,ep:a.ep});
        localStorage.setItem('continueWatching',JSON.stringify(continueWatching));
        alert(`Started watching ${a.title}`);
      });
      cardsDiv.appendChild(card);
    });
  }

  renderCards(animeData[currentSection]);

  // Navigation buttons
  document.querySelectorAll('nav button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const sec=btn.dataset.section;
      currentSection=sec;
      if(sec==='wishlist') renderCards(animeData.mostRated.filter(a=>wishlist.includes(a.id)));
      else if(sec==='continue') renderCards(continueWatching.map(c=>animeData.mostRated.concat(animeData.trending,animeData.airingNow,animeData.upcoming).find(a=>a.id===c.id)));
      else renderCards(animeData[sec]);
    });
  });

  // Search
  document.getElementById('search').addEventListener('input',e=>{
    const term=e.target.value.toLowerCase();
    const allAnime=[].concat(...Object.values(animeData));
    renderCards(allAnime.filter(a=>a.title.toLowerCase().includes(term)));
  });

  // Trailer modal
  document.getElementById('closeTrailer').addEventListener('click',()=>{
    const modal=document.getElementById('trailerModal');
    modal.querySelector('iframe').src='';
    modal.style.display='none';
  });

  // Service Worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
  }
</script>

</body>
</html>
