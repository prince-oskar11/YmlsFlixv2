<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUIXY - Juice Sales Counter</title>
<link rel="manifest" href="manifest.json" />
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #juiceList { margin-top: 20px; }
  .juiceItem { display: flex; align-items: center; margin-bottom: 10px; }
  .juiceName { width: 150px; }
  .counter { width: 50px; text-align: center; font-weight: bold; }
  button { margin: 0 5px; }
</style>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js');
    });
  }

  const juices = {}; // Store juice counts

  function addJuice() {
    const nameInput = document.getElementById('newJuiceName');
    const name = nameInput.value.trim();
    if (!name) {
      alert('Please enter a juice name.');
      return;
    }
    if (juices[name]) {
      alert('Juice already exists.');
      return;
    }
    juices[name] = 0;
    nameInput.value = '';
    displayJuiceList();
    updateSalesSummary();
  }

  function displayJuiceList() {
    const container = document.getElementById('juiceList');
    container.innerHTML = '';
    for (const name in juices) {
      const div = document.createElement('div');
      div.className = 'juiceItem';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'juiceName';
      nameSpan.innerText = name;

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => {
        if (juices[name] > 0) {
          juices[name]--;
          displayJuiceList();
          updateSalesSummary();
        }
      };

      const countSpan = document.createElement('span');
      countSpan.className = 'counter';
      countSpan.innerText = juices[name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => {
        juices[name]++;
        displayJuiceList();
        updateSalesSummary();
      };

      div.appendChild(nameSpan);
      div.appendChild(minusBtn);
      div.appendChild(countSpan);
      div.appendChild(plusBtn);
      container.appendChild(div);
    }
  }

  function updateSalesSummary() {
    const summaryDiv = document.getElementById('salesSummary');
    summaryDiv.innerHTML = '';
    for (const name in juices) {
      const p = document.createElement('p');
      p.innerText = `${name}: ${juices[name]} sold`;
      summaryDiv.appendChild(p);
    }
  }

  window.onload = () => {
    displayJuiceList();
    updateSalesSummary();
  }
</script>
</head>
<body>
<h1>JUIXY - Juice Sales Counter</h1>

<h2>Add New Juice</h2>
<input type="text" id="newJuiceName" placeholder="Enter juice name" />
<button onclick="addJuice()">Add Juice</button>

<h2>Juice List</h2>
<div id="juiceList"></div>

<h2>Sales Summary</h2>
<div id="salesSummary"></div>
</body>
</html>
