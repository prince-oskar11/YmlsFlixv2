<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YmlFlix</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>
<body>

<header>
  <h1>YmlFlix</h1>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search anime...">
    <button id="installBtn">Install</button>
  </div>

  <div id="suggestions"></div>

  <nav>
    <button onclick="goHome()">Home</button>
    <button onclick="showGenres()">Genres</button>
    <button onclick="showWishlist()">Wishlist</button>
    <button onclick="showProfile()">Profile</button>
  </nav>
</header>

<main id="content"></main>

<!-- PLAYER -->
<div id="playerModal" class="hidden">
  <video id="videoPlayer" controls></video>
  <button onclick="nextEpisode()">Next Episode</button>
</div>

<script src="app.js"></script>
</body>
</html>
