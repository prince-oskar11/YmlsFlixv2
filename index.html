<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YMLAnime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }
    header {
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
    }
    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .container {
      padding: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .card {
      background: #1e293b;
      padding: 10px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }
    iframe {
      width: 100%;
      height: 400px;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      width: 90%;
      max-width: 600px;
    }
  </style>
</head>

<body>

<header>YMLAnime</header>

<div class="container">
  <input id="search" placeholder="Search anime...">
  <button onclick="searchAnime()">Search</button>

  <div id="results" class="grid"></div>
</div>

<!-- Trailer Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <button onclick="closeTrailer()">Close</button>
    <iframe id="trailer" allowfullscreen></iframe>
  </div>
</div>

<script>
async function searchAnime() {
  const query = document.getElementById("search").value;

  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&sfw=true`);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.data.forEach(anime => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${anime.images.jpg.image_url}" onclick="playTrailer('${anime.trailer?.embed_url || ""}')">
        <h3>${anime.title}</h3>
      `;

      resultsDiv.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    alert("Error loading anime");
  }
}

function playTrailer(url) {
  if (!url) {
    alert("No trailer available");
    return;
  }

  document.getElementById("modal").style.display = "flex";
  document.getElementById("trailer").src = url;
}

function closeTrailer() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("trailer").src = "";
}
</script>

</body>
</html>
