<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUIXY - Juice & Dessert App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background-color: #f5deb3; /* beige background */
  }

  /* Header styles */
  #header {
    background-color: #4CAF50; /* green background */
    padding: 20px;
    text-align: center;
    position: relative;
  }
  #header h1 {
    margin: 0;
    font-size: 36px;
    color: green; /* name in green */
  }

  /* Top buttons container */
  #topButtons {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex; justify-content: space-between; padding: 0 20px;
  }
  #topButtons button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  #stockBtn { background-color: #2196F3; color: white; }
  #clearBtn { background-color: #f44336; color: white; }

  /* Navigation styles */
  #nav {
    display: flex; justify-content: center; gap: 15px; margin-top: 10px; background:#e0e0e0; padding:10px 0;
  }
  #nav span {
    cursor: pointer; font-weight: bold; color: green; font-size: 18px; padding: 8px 12px; border-radius: 4px; transition: background 0.3s;
  }
  #nav span:hover { background-color: #c8e6c9; }

  /* Main content style */
  section {
    display: none;
    max-width: 800px; margin:20px auto; background: #fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  section.active { display: block; }

  /* Section header titles in brown */
  h2 {
    color: brown;
    margin-top: 0;
  }

  /* Items list styles */
  .item { display: flex; align-items: center; margin-bottom: 10px; }
  .itemName { flex: 1; font-size: 16px; }
  .counter { width: 50px; text-align: center; font-weight: bold; }
  button { margin: 0 5px; padding: 4px 8px; border: none; border-radius: 4px; cursor:pointer; background-color: #4CAF50; color: white; font-weight: bold; }
  button:hover { background-color: #45a049; }

  /* Add item input styles */
  .addSection {
    margin-bottom: 15px;
  }
  .addSection input {
    padding: 8px; width: 200px; margin-right: 10px; border: 1px solid #ccc; border-radius:4px;
  }
  .addSection button {
    padding: 8px 12px; background-color: #2196F3; color: white; border: none; border-radius:4px; cursor:pointer;
  }
  .addSection button:hover { background-color: #0b7dda; }

  /* Stock page styles */
  #stockPage {
    display: none;
    max-width: 800px; margin:20px auto; background: #fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  #stockPage.active { display: block; }

  #stockHeader {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
  }
  #stockHeader h2 { margin: 0; }
  #closeStockBtn {
    padding: 8px 12px; border: none; border-radius: 4px; background-color: #f44336; color: white; cursor: pointer;
  }
  #closeStockBtn:hover { background-color: #d32f2f; }

  /* Stock items list */
  #stockItems {
    margin-top: 10px;
  }
  .stockItem {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 8px; background: #e0e0e0; border-radius: 4px;
  }
  .stockItem span { flex: 1; }
</style>
<script>
  // Initialize data storage for main categories
  let dataSections = {
    'Juice': {},
    'Milk-Cake': {},
    'Tiramisu': {},
    'Matcha': {},
    'Mojito': {}
  };
  for (let key in dataSections) {
    dataSections[key] = JSON.parse(localStorage.getItem(key)) || {};
  }

  // Initialize stock data
  let stockItems = JSON.parse(localStorage.getItem('Stock')) || {};

  function saveData() {
    for (let section in dataSections) {
      localStorage.setItem(section, JSON.stringify(dataSections[section]));
    }
    localStorage.setItem('Stock', JSON.stringify(stockItems));
  }

  function showSection(id) {
    document.querySelectorAll('section, #stockPage').forEach(s => s.classList.remove('active'));
    if (id === 'Stock') {
      document.getElementById('stockPage').classList.add('active');
    } else {
      document.getElementById(id).classList.add('active');
    }
  }

  // Add new item to main sections
  function addItem(sectionName, inputId) {
    const name = document.getElementById(inputId).value.trim();
    if (!name || dataSections[sectionName][name]) { alert('Enter a valid and new item name'); return; }
    dataSections[sectionName][name] = 0;
    document.getElementById(inputId).value = '';
    displaySectionItems(sectionName);
    updateTopSellerDisplay();
    saveData();
  }

  // Display items in main sections with delete button
  function displaySectionItems(sectionName) {
    const container = document.getElementById('itemsContainer_' + sectionName);
    if (!container) return;
    container.innerHTML = '';
    const items = dataSections[sectionName];
    for (const name in items) {
      const div = document.createElement('div');
      div.className = 'item';

      const n = document.createElement('span');
      n.className = 'itemName';
      n.innerText = name;

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => { if (items[name] > 0) { items[name]--; displaySectionItems(sectionName); updateTopSellerDisplay(); saveData(); } };

      const countSpan = document.createElement('span');
      countSpan.className = 'counter';
      countSpan.innerText = items[name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { items[name]++; displaySectionItems(sectionName); updateTopSellerDisplay(); saveData(); };

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'deleteBtn';
      deleteBtn.innerText = 'x';
      deleteBtn.onclick = () => {
        if (confirm(`Delete "${name}"?`)) {
          delete dataSections[sectionName][name];
          displaySectionItems(sectionName);
          updateTopSellerDisplay();
          saveData();
        }
      };

      div.appendChild(n);
      div.appendChild(minusBtn);
      div.appendChild(countSpan);
      div.appendChild(plusBtn);
      div.appendChild(deleteBtn);
      container.appendChild(div);
    }
  }

  // Reset all counts
  function resetCounts() {
    if (confirm('Are you sure you want to reset all counts to zero?')) {
      for (let section in dataSections) {
        for (let item in dataSections[section]) {
          dataSections[section][item] = 0;
        }
        displaySectionItems(section);
      }
      updateTopSellerDisplay();
      saveData();
    }
  }

  // Update Top Seller display
  function updateTopSaler() {
    let totalSales = {};
    for (let section in dataSections) {
      for (const name in dataSections[section]) {
        totalSales[name] = (totalSales[name] || 0) + dataSections[section][name];
      }
    }
    let maxCount = -1;
    let topItem = '';
    for (const name in totalSales) {
      if (totalSales[name] > maxCount) {
        maxCount = totalSales[name];
        topItem = name;
      }
    }
    document.getElementById('topSellerText').innerText = topItem ? `${topItem} (${maxCount} sales)` : 'No sales yet';
  }

  // Display stock items with updated numbers
  function displayStock() {
    const container = document.getElementById('stockItems');
    container.innerHTML = '';
    for (const item in stockItems) {
      const div = document.createElement('div');
      div.className = 'stockItem';

      const nameSpan = document.createElement('span');
      nameSpan.innerText = item;

      const controlsDiv = document.createElement('div');

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => { if (stockItems[item] > 0) { stockItems[item]--; saveData(); displayStock(); } };

      const countSpan = document.createElement('span');
      countSpan.innerText = stockItems[item];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { stockItems[item]++; saveData(); displayStock(); };

      const xBtn = document.createElement('button');
      xBtn.innerText = 'x';
      xBtn.onclick = () => {
        if (confirm(`Delete stock item "${item}"?`)) {
          delete stockItems[item];
          saveData();
          displayStock();
        }
      };

      controlsDiv.appendChild(minusBtn);
      controlsDiv.appendChild(plusBtn);
      controlsDiv.appendChild(xBtn);

      div.appendChild(nameSpan);
      div.appendChild(controlsDiv);

      container.appendChild(div);
    }
  }

  function addStockItem() {
    const input = document.getElementById('stockInput');
    const name = input.value.trim();
    if (!name || stockItems[name]) { alert('Enter a valid and new stock item'); return; }
    stockItems[name] = 0;
    input.value = '';
    displayStock();
    saveData();
  }

  // When page loads
  window.onload = () => {
    for (let section in dataSections) {
      displaySectionItems(section);
    }
    displayStock();
    updateTopSaler();
  };
</script>
</head>
<body>

<!-- Header with name and buttons -->
<div id="header">
  <h1 style="margin:0; color:green;">JUIXY</h1>
  <div id="topButtons" style="position:absolute; top:20px; width:100%; display:flex; justify-content:space-between; padding:0 20px;">
    <button id="stockBtn" onclick="showSection('Stock')">Stock</button>
    <button id="clearBtn" onclick="resetCounts()">Clear Counts</button>
  </div>
</div>

<!-- Navigation menu -->
<div id="nav">
  <span onclick="showSection('Juice')">Juice</span>
  <span onclick="showSection('Milk-Cake')">Milk-Cake</span>
  <span onclick="showSection('Tiramisu')">Tiramisu</span>
  <span onclick="showSection('Matcha')">Matcha</span>
  <span onclick="showSection('Mojito')">Mojito</span>
  <span onclick="showTopSaler()">Top Seller</span>
</div>

<!-- Main sections for categories -->
<!-- Juice -->
<section id="Juice" class="active">
  <h2>Add New Juice</h2>
  <div class="addSection">
    <input type="text" id="juiceInput" placeholder="Enter juice name" />
    <button onclick="addItem('Juice', 'juiceInput')">Add Juice</button>
  </div>
  <h3>Juice List</h3>
  <div id="itemsContainer_Juice"></div>
</section>

<!-- Milk-Cake -->
<section id="Milk-Cake">
  <h2>Add New Milk-Cake</h2>
  <div class="addSection">
    <input type="text" id="milkCakeInput" placeholder="Enter Milk-Cake name" />
    <button onclick="addItem('Milk-Cake', 'milkCakeInput')">Add Milk-Cake</button>
  </div>
  <h3>Milk-Cake List</h3>
  <div id="itemsContainer_Milk-Cake"></div>
</section>

<!-- Tiramisu -->
<section id="Tiramisu">
  <h2>Add New Tiramisu</h2>
  <div class="addSection">
    <input type="text" id="tiramisuInput" placeholder="Enter Tiramisu name" />
    <button onclick="addItem('Tiramisu', 'tiramisuInput')">Add Tiramisu</button>
  </div>
  <h3>Tiramisu List</h3>
  <div id="itemsContainer_Tiramisu"></div>
</section>

<!-- Matcha -->
<section id="Matcha">
  <h2>Add New Matcha</h2>
  <div class="addSection">
    <input type="text" id="matchaInput" placeholder="Enter Matcha name" />
    <button onclick="addItem('Matcha', 'matchaInput')">Add Matcha</button>
  </div>
  <h3>Matcha List</h3>
  <div id="itemsContainer_Matcha"></div>
</section>

<!-- Mojito -->
<section id="Mojito">
  <h2>Add New Mojito</h2>
  <div class="addSection">
    <input type="text" id="mojitoInput" placeholder="Enter Mojito name" />
    <button onclick="addItem('Mojito', 'mojitoInput')">Add Mojito</button>
  </div>
  <h3>Mojito List</h3>
  <div id="itemsContainer_Mojito"></div>
</section>

<!-- Top Seller next to Mojito -->
<div id="TopSeller" style="display:flex; justify-content:space-around; margin-top:20px;">
  <div style="background:#f0f0f0; padding:10px; border-radius:8px; width:200px;">
    <h3>Top Seller</h3>
    <p id="topSellerText">Calculating...</p>
    <button onclick="showTopSaler()">Show Top Seller</button>
  </div>
</div>

<!-- Stock Page -->
<div id="stockPage">
  <div id="stockHeader">
    <h2>Stock Management</h2>
    <button id="closeStockBtn" onclick="showSection('')">Close</button>
  </div>
  <div>
    <input type="text" id="stockInput" placeholder="New stock item" />
    <button onclick="addStockItem()">Add Stock Item</button>
  </div>
  <div id="stockItems"></div>
</div>

<script>
  // All scripts are included above, managing display, data, and interactions
  // The key fix: stock numbers now show and update correctly when clicking -/+ buttons
</script>
</body>
</html>
