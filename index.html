<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUIXY - Juice & Dessert App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background-color: #f5deb3;
  }

  /* Header styles */
  #header {
    background-color: #4CAF50;
    padding: 20px;
    position: relative;
    text-align: center;
  }
  #header h1 {
    margin: 0;
    font-size: 36px;
    color: green;
  }

  /* Top buttons */
  #topButtons {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex; justify-content: space-between; padding: 0 20px;
  }
  #topButtons button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  #stockBtn { background-color: #2196F3; color: white; }
  #clearBtn { background-color: #f44336; color: white; }

  /* Navigation */
  #nav {
    display: flex; justify-content: center; gap: 15px; margin-top: 10px; background:#e0e0e0; padding:10px 0;
  }
  #nav span {
    cursor: pointer; font-weight: bold; color: green; font-size: 18px; padding: 8px 12px; border-radius: 4px; transition: background 0.3s;
  }
  #nav span:hover { background-color: #c8e6c9; }

  /* Sections */
  section {
    display: none;
    max-width: 800px; margin:20px auto; background: #fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  section.active { display: block; }

  /* Headers in brown */
  h2 {
    color: brown;
    margin-top: 0;
  }

  /* Items list */
  .item { display: flex; align-items: center; margin-bottom: 10px; }
  .itemName { flex: 1; font-size: 16px; }
  .counter { width: 50px; text-align: center; font-weight: bold; }
  button { margin: 0 5px; padding: 4px 8px; border: none; border-radius: 4px; cursor:pointer; background-color: #4CAF50; color: white; font-weight: bold; }
  button:hover { background-color: #45a049; }
  .deleteBtn {
    margin-left: 10px; padding: 2px 6px; border: none; border-radius: 50%; background-color: #f44336; color: white; font-weight: bold; cursor:pointer;
  }
  .deleteBtn:hover { background-color: #d32f2f; }

  /* Add section styles */
  .addSection {
    margin-bottom: 15px;
  }
  .addSection input {
    padding: 8px; width: 200px; margin-right: 10px; border: 1px solid #ccc; border-radius:4px;
  }
  .addSection button {
    padding: 8px 12px; background-color: #2196F3; color: white; border: none; border-radius:4px; cursor:pointer;
  }
  .addSection button:hover { background-color: #0b7dda; }

  /* Layout for Mojito, Sandwich, and Top Seller side by side */
  #mojitoSandwichAndTop {
    display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin: 20px auto; max-width: 1000px;
  }
  #Mojito {
    flex: 1; min-width:250px;
  }
  #Sandwich {
    flex: 1; min-width:250px;
  }
  #topSellersSection {
    flex: 1; min-width:250px; padding:10px; background:#e0e0e0; border-radius:8px; min-height: 150px;
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1 style="margin:0; color:green;">JUIXY</h1>
  <div id="topButtons" style="position:absolute; top:20px; width:100%; display:flex; justify-content:space-between; padding:0 20px;">
    <button id="stockBtn" onclick="alert('Stock management not implemented')">Stock</button>
    <button id="clearBtn" onclick="resetCounts()">Clear Counts</button>
  </div>
</div>

<!-- Navigation -->
<div id="nav">
  <span onclick="showSection('Juice')">Juice</span>
  <span onclick="showSection('Milk-Cake')">Milk-Cake</span>
  <span onclick="showSection('Tiramisu')">Tiramisu</span>
  <span onclick="showSection('Matcha')">Matcha</span>
  <span onclick="showSection('Mojito')">Mojito</span>
  <span onclick="showSection('Sandwich')">Sandwich</span>
  <span onclick="showSection('TopSellers')">Top Sellers</span>
</div>

<!-- Sections -->
<!-- Juice -->
<section id="Juice" class="active">
  <h2>Add New Juice</h2>
  <div class="addSection">
    <input type="text" id="juiceInput" placeholder="Enter juice name" />
    <button onclick="addItem('Juice', 'juiceInput')">Add Juice</button>
  </div>
  <h3>Juice List</h3>
  <div id="itemsContainer_Juice"></div>
</section>

<!-- Milk-Cake -->
<section id="Milk-Cake">
  <h2>Add New Milk-Cake</h2>
  <div class="addSection">
    <input type="text" id="milkCakeInput" placeholder="Enter Milk-Cake name" />
    <button onclick="addItem('Milk-Cake', 'milkCakeInput')">Add Milk-Cake</button>
  </div>
  <h3>Milk-Cake List</h3>
  <div id="itemsContainer_Milk-Cake"></div>
</section>

<!-- Tiramisu -->
<section id="Tiramisu">
  <h2>Add New Tiramisu</h2>
  <div class="addSection">
    <input type="text" id="tiramisuInput" placeholder="Enter Tiramisu name" />
    <button onclick="addItem('Tiramisu', 'tiramisuInput')">Add Tiramisu</button>
  </div>
  <h3>Tiramisu List</h3>
  <div id="itemsContainer_Tiramisu"></div>
</section>

<!-- Matcha -->
<section id="Matcha">
  <h2>Add New Matcha</h2>
  <div class="addSection">
    <input type="text" id="matchaInput" placeholder="Enter Matcha name" />
    <button onclick="addItem('Matcha', 'matchaInput')">Add Matcha</button>
  </div>
  <h3>Matcha List</h3>
  <div id="itemsContainer_Matcha"></div>
</section>

<!-- Mojito and Sandwich side by side -->
<div id="mojitoSandwichAndTop" style="margin:20px auto; max-width:1000px; display:flex; flex-wrap:wrap;">
  <!-- Mojito -->
  <section id="Mojito" style="flex:1; min-width:250px;">
    <h2>Add New Mojito</h2>
    <div class="addSection">
      <input type="text" id="mojitoInput" placeholder="Enter Mojito name" />
      <button onclick="addItem('Mojito', 'mojitoInput')">Add Mojito</button>
    </div>
    <h3>Mojito List</h3>
    <div id="itemsContainer_Mojito"></div>
  </section>
  <!-- Sandwich -->
  <section id="Sandwich" style="flex:1; min-width:250px;">
    <h2>Add New Sandwich</h2>
    <div class="addSection">
      <input type="text" id="sandwichInput" placeholder="Enter Sandwich name" />
      <button onclick="addItem('Sandwich', 'sandwichInput')">Add Sandwich</button>
    </div>
    <h3>Sandwich List</h3>
    <div id="itemsContainer_Sandwich"></div>
  </section>
  <!-- Top Seller -->
  <section id="topSellersSection" style="flex:1; min-width:250px; padding:10px; background:#e0e0e0; border-radius:8px;">
    <h2>Top Seller</h2>
    <div id="topSellersList" style="font-size:16px; font-weight:bold;">Loading...</div>
  </section>
</div>

<script>
  // Initialize data
  let dataSections = {
    'Juice': {},
    'Milk-Cake': {},
    'Tiramisu': {},
    'Matcha': {},
    'Mojito': {},
    'Sandwich': {}
  };
  for (let key in dataSections) {
    dataSections[key] = JSON.parse(localStorage.getItem(key)) || {};
  }

  function saveData() {
    for (let section in dataSections) {
      localStorage.setItem(section, JSON.stringify(dataSections[section]));
    }
  }

  function showSection(id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function addItem(sectionName, inputId) {
    const name = document.getElementById(inputId).value.trim();
    if (!name || dataSections[sectionName][name]) { alert('Enter a valid and new item name'); return; }
    dataSections[sectionName][name] = 0;
    document.getElementById(inputId).value = '';
    displaySectionItems(sectionName);
    if (sectionName === 'Mojito' || sectionName === 'Sandwich') updateTopSellers();
    saveData();
  }

  function displaySectionItems(sectionName) {
    const container = document.getElementById('itemsContainer_' + sectionName);
    if (!container) return;
    container.innerHTML = '';
    const items = dataSections[sectionName];
    for (const name in items) {
      const div = document.createElement('div');
      div.className = 'item';

      const n = document.createElement('span');
      n.className = 'itemName';
      n.innerText = name;

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => {
        if (items[name] > 0) { items[name]--; displaySectionItems(sectionName); if (sectionName === 'Mojito' || sectionName === 'Sandwich') updateTopSellers(); saveData(); }
      };

      const countSpan = document.createElement('span');
      countSpan.className = 'counter';
      countSpan.innerText = items[name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => {
        items[name]++;
        displaySectionItems(sectionName);
        if (sectionName === 'Mojito' || sectionName === 'Sandwich') updateTopSellers();
        saveData();
      };

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'deleteBtn';
      deleteBtn.innerText = 'X';
      deleteBtn.title = 'Delete Item';
      deleteBtn.onclick = () => {
        if (confirm(`Are you sure you want to delete "${name}"?`)) {
          delete dataSections[sectionName][name];
          displaySectionItems(sectionName);
          if (sectionName === 'Mojito' || sectionName === 'Sandwich') updateTopSellers();
          saveData();
        }
      };

      div.appendChild(n);
      div.appendChild(minusBtn);
      div.appendChild(countSpan);
      div.appendChild(plusBtn);
      div.appendChild(deleteBtn);
      container.appendChild(div);
    }
  }

  function resetCounts() {
    if (confirm('Are you sure you want to reset all counts to zero?')) {
      for (let section in dataSections) {
        for (let item in dataSections[section]) {
          dataSections[section][item] = 0;
        }
        displaySectionItems(section);
      }
      updateTopSellers();
      saveData();
    }
  }

  function updateTopSellers() {
    let totals = {};
    for (let section in dataSections) {
      for (let name in dataSections[section]) {
        totals[name] = (totals[name] || 0) + dataSections[section][name];
      }
    }
    let maxCount = -1;
    let topItem = '';
    for (let name in totals) {
      if (totals[name] > maxCount) {
        maxCount = totals[name];
        topItem = name;
      }
    }
    const displayDiv = document.getElementById('topSellersList');
    if (displayDiv) {
      if (maxCount > 0) {
        displayDiv.innerHTML = `Top Seller: <strong>${topItem}</strong> with ${maxCount} sales`;
      } else {
        displayDiv.innerHTML = 'No sales yet.';
      }
    }
  }

  window.onload = () => {
    for (let section in dataSections) {
      displaySectionItems(section);
    }
    updateTopSellers();
  };
</script>

</body>
</html>
