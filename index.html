<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YMLAnime</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<style>
  body {margin:0;font-family:Arial;background:#0f172a;color:white;}
  header {padding:15px;font-size:24px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;}
  header button {background:#3b82f6;border:none;color:white;padding:8px 12px;border-radius:8px;cursor:pointer;}
  .container {padding:10px;}
  input {width:60%;padding:10px;border-radius:8px;border:none;margin-right:10px;}
  button.section-btn {margin:5px;background:#2563eb;border:none;color:white;padding:5px 10px;border-radius:5px;cursor:pointer;}
  .grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px;}
  .card {background:#1e293b;padding:10px;border-radius:10px;}
  .card img {width:100%;border-radius:8px;cursor:pointer;}
  iframe {width:100%;height:300px;}
  .modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:center;z-index:100;}
  .modal-content {width:90%;max-width:600px;}
  .genre-bar {margin-top:10px;overflow-x:auto;white-space:nowrap;}
  .genre-bar button {margin-right:5px;}
</style>
</head>
<body>

<header>
  YMLAnime
  <button onclick="showWatchlist()">Watchlist</button>
</header>

<div class="container">
  <input id="search" placeholder="Search anime...">
  <button onclick="searchAnime()">Search</button>

  <div class="genre-bar" id="genres"></div>

  <div>
    <button class="section-btn" onclick="loadSection('trending')">Trending</button>
    <button class="section-btn" onclick="loadSection('popular')">Most Popular</button>
    <button class="section-btn" onclick="loadSection('airing')">Airing Now</button>
    <button class="section-btn" onclick="loadSection('top')">Top Rated</button>
    <button class="section-btn" onclick="loadSection('upcoming')">Upcoming</button>
  </div>

  <div id="results" class="grid"></div>
</div>

<!-- Trailer Modal -->
<div id="modal" class="modal" style="display:none;">
  <div class="modal-content" style="background:#1e293b; padding:20px; border-radius:10px; position:relative;">
    <button style="position:absolute; top:10px; right:10px; background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;" onclick="closeTrailer()">Close</button>
    <div style="margin-bottom:10px;">
      <button onclick="loadStream('vidstream')">Vidstream</button>
      <button onclick="loadStream('filemoon')">Filemoon</button>
      <button onclick="loadStream('streamSB')">StreamSB</button>
      <button onclick="loadStream('mp4upload')">Mp4Upload</button>
      <button onclick="loadStream('doodstream')">DoodStream</button>
    </div>
    <iframe id="trailer" style="width:100%; height:400px; border:none;" allowfullscreen></iframe>
  </div>
</div>

<script>
let watchlist = JSON.parse(localStorage.getItem('watchlist')||'[]');
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  alert('You can install YMLAnime from your browser menu!');
});

function promptInstall() {
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{deferredPrompt=null});
  }
}

function renderResults(data) {
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";
  data.forEach(anime => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${anime.images.jpg.image_url}" onclick="playTrailer('${anime.trailer?.embed_url||''}')">
      <h3>${anime.title}</h3>
      <button onclick="addToWatchlist(${anime.mal_id})">Add</button>
    `;
    resultsDiv.appendChild(div);
  });
}

async function searchAnime() {
  const query = document.getElementById("search").value;
  console.log('Searching for:', query);
  if (!query) {
    console.log('Empty query, returning');
    return;
  }
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&sfw=true`);
    console.log('Search response status:', res.status);
    if (!res.ok) {
      console.error('Search fetch error:', res.statusText);
      alert('Failed to search.');
      return;
    }
    const data = await res.json();
    console.log('Search data:', data);
    renderResults(data.data || []);
  } catch (err) {
    console.error('Search fetch error:', err);
  }
}

async function loadSection(section) {
  let url = '';
  switch (section) {
    case 'trending': 
      url = 'https://api.jikan.moe/v4/top/anime?filter=bypopularity'; 
      break;
    case 'popular': 
      url = 'https://api.jikan.moe/v4/top/anime?filter=bypopularity'; 
      break;
    case 'airing': 
      url = 'https://api.jikan.moe/v4/seasons/now'; 
      break;
    case 'top': 
      url = 'https://api.jikan.moe/v4/top/anime'; 
      break;
    case 'upcoming': 
      url = 'https://api.jikan.moe/v4/seasons/upcoming'; 
      break;
  }
  console.log('Loading section:', section);
  console.log('Fetching URL:', url);
  // Optional: Show loading spinner
  document.getElementById('results').innerHTML = 'Loading...';

  try {
    const res = await fetch(url);
    console.log('Response status:', res.status);
    if (!res.ok) {
      console.error('Fetch error:', res.statusText);
      alert('Failed to load data. Please try again later.');
      return;
    }
    const data = await res.json();
    console.log('Data received:', data);
    renderResults(data.data || []);
  } catch (err) {
    console.error('Fetch error:', err);
    alert('Error fetching data.');
  }
}

function playTrailer(url){
  if(!url){alert('No trailer');return;}
  document.getElementById('modal').style.display='flex';
  document.getElementById('trailer').src=url;
}

// Map of streaming sources to your actual streaming URLs
const streamSources = {
  vidstream: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4', // Replace with your actual URL
  filemoon: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4',
  streamSB: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4',
  mp4upload: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4',
  doodstream: 'https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4'
};

function loadStream(source) {
  const url = streamSources[source];
  if (!url) {
    alert('Stream URL not available');
    return;
  }
  const iframe = document.getElementById('trailer');
  iframe.src = url;
  document.getElementById('modal').style.display = 'flex';
}

function closeTrailer() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('trailer').src = '';
}

function addToWatchlist(id){
  if(!watchlist.includes(id)) watchlist.push(id);
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
  alert('Added to Watchlist');
}

function showWatchlist(){
  if(!watchlist.length){alert('Watchlist empty'); return;}
  Promise.all(watchlist.map(id=>fetch(`https://api.jikan.moe/v4/anime/${id}`).then(res=>res.json())))
    .then(results=>renderResults(results.map(r=>r.data)));
}

async function loadGenres(){
  const res = await fetch('https://api.jikan.moe/v4/genres/anime');
  const data = await res.json();
  const bar=document.getElementById('genres');
  data.data.forEach(g=>{
    const btn=document.createElement('button');
    btn.innerText=g.name;
    btn.className='section-btn';
    btn.onclick=()=>loadGenre(g.mal_id);
    bar.appendChild(btn);
  });
}

async function loadGenre(id){
  const res=await fetch(`https://api.jikan.moe/v4/anime?genres=${id}&sfw=true`);
  const data=await res.json();
  renderResults(data.data||[]);
}

// Load homepage
loadSection('trending');
loadGenres();

// Service Worker registration for offline caching
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
