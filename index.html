<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YmlAnime</title>
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
}

/* HEADER */
header {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:linear-gradient(to bottom,#000,transparent);
  z-index:100;
}

.logo { color:#00ff88; font-size:24px; }

.search {
  padding:6px;
  border-radius:20px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

.icons span {
  margin-left:15px;
  cursor:pointer;
}

/* HERO */
.hero {
  height:70vh;
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:40px;
}

.hero h1 { font-size:40px; }

/* ROW */
.row { padding:20px; margin-top:-80px; }
.scroll {
  display:flex;
  overflow-x:auto;
  gap:12px;
}

/* CARD */
.card {
  min-width:160px;
  position:relative;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card img { width:100%; height:230px; object-fit:cover; }

.card:hover { transform:scale(1.08); }

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  opacity:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.card:hover .overlay { opacity:1; }

.play {
  background:#00ff88;
  color:#000;
  padding:6px 12px;
  border-radius:20px;
}

/* BADGES */
.badge {
  position:absolute;
  font-size:11px;
  padding:3px 6px;
}

.ep { top:5px; left:5px; background:#000; }
.score { bottom:5px; left:5px; background:#00ff88; color:#000; }
.age { bottom:5px; right:5px; background:red; }
.subdub { top:5px; right:30px; background:blue; }

.heart { top:5px; right:5px; position:absolute; }

/* PLAYER */
#player { display:none; padding:20px; }
iframe { width:100%; height:400px; }
</style>
</head>

<body>

<header>
  <div>
    <span class="logo">YmlAnime</span>
    <input id="search" class="search" placeholder="Search...">
  </div>

  <div class="icons">
    <span onclick="goHome()">🏠</span>
    <span onclick="showWishlist()">❤️</span>
    <span onclick="alert('Genres coming')">🎭</span>
    <span onclick="profile()">👤</span>
    <span id="installBtn">⬇️</span>
  </div>
</header>

<div class="hero" id="hero">
  <div>
    <h1 id="heroTitle"></h1>
  </div>
</div>

<div id="content"></div>

<div id="player">
  <button onclick="goHome()">⬅ Back</button>
  <h2 id="title"></h2>
  <iframe id="video"></iframe>
  <br>
  <button onclick="nextEpisode()">Next Episode</button>
  <button>Sub</button>
  <button>Dub</button>
</div>

<script>
// DATA
const anime = [
 {id:1,title:'Attack on Titan',ep:75,score:9.2,age:'R',img:'https://cdn.myanimelist.net/images/anime/10/47347.jpg'},
 {id:2,title:'Jujutsu Kaisen',ep:24,score:8.7,age:'PG-13',img:'https://cdn.myanimelist.net/images/anime/1171/109222.jpg'},
 {id:3,title:'Chainsaw Man',ep:12,score:8.8,age:'R',img:'https://cdn.myanimelist.net/images/anime/1939/136859.jpg'}
];

// STORAGE
let wishlist = JSON.parse(localStorage.getItem('wishlist')||'[]');
let history = JSON.parse(localStorage.getItem('history')||'[]');
let user = localStorage.getItem('user');

// HERO
function setHero(a){
 document.getElementById('hero').style.backgroundImage=`url(${a.img})`;
 document.getElementById('heroTitle').innerText=a.title;
}
setHero(anime[0]);

// CREATE ROW
function createRow(name,list){
 const row=document.createElement('div');
 row.className='row';
 row.innerHTML=`<h2>${name}</h2><div class="scroll"></div>`;
 const sc=row.querySelector('.scroll');

 list.forEach(a=>{
  const c=document.createElement('div');
  c.className='card';

  c.innerHTML=`
    <img src="${a.img}">
    <div class="overlay">
      <div class="play">▶ Play</div>
      <div>${a.title}</div>
    </div>
    <span class="badge ep">EP ${a.ep}</span>
    <span class="badge score">⭐ ${a.score}</span>
    <span class="badge age">${a.age}</span>
    <span class="badge subdub">SUB/DUB</span>
    <span class="heart">${wishlist.includes(a.id)?'💚':'🤍'}</span>
  `;

  c.onclick=()=>openPlayer(a);

  c.querySelector('.heart').onclick=(e)=>{
    e.stopPropagation();
    if(wishlist.includes(a.id)) wishlist=wishlist.filter(i=>i!==a.id);
    else wishlist.push(a.id);
    localStorage.setItem('wishlist',JSON.stringify(wishlist));
    load();
  };

  sc.appendChild(c);
 });

 return row;
}

// LOAD
function load(){
 const content=document.getElementById('content');
 content.innerHTML='';
 content.appendChild(createRow('Continue Watching',history));
 content.appendChild(createRow('Most Popular',anime));
 content.appendChild(createRow('Trending',anime));
 content.appendChild(createRow('Airing Now',anime));
 content.appendChild(createRow('Top Rated',anime));
 content.appendChild(createRow('Upcoming',anime));
}
load();

// PLAYER
function openPlayer(a){
 document.getElementById('content').style.display='none';
 document.getElementById('player').style.display='block';
 document.getElementById('title').innerText=a.title;
 document.getElementById('video').src="https://www.youtube.com/embed/dQw4w9WgXcQ";

 history.push(a);
 localStorage.setItem('history',JSON.stringify(history));
}

function nextEpisode(){
 alert("Next episode logic");
}

// NAV
function goHome(){
 document.getElementById('player').style.display='none';
 document.getElementById('content').style.display='block';
 load();
}

function showWishlist(){
 const content=document.getElementById('content');
 content.innerHTML='';
 content.appendChild(createRow('Wishlist',anime.filter(a=>wishlist.includes(a.id))));
}

function profile(){
 if(!user){
   const name=prompt("Enter username");
   localStorage.setItem('user',name);
 } else {
   if(confirm("Clear history?")){
     history=[];
     localStorage.setItem('history','[]');
   }
 }
}

// SEARCH
document.getElementById('search').addEventListener('input',e=>{
 const val=e.target.value.toLowerCase();
 const filtered=anime.filter(a=>a.title.toLowerCase().includes(val));
 const content=document.getElementById('content');
 content.innerHTML='';
 content.appendChild(createRow('Search Results',filtered));
});

// INSTALL
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
 e.preventDefault();
 deferredPrompt=e;
});
document.getElementById('installBtn').onclick=()=>{
 if(deferredPrompt) deferredPrompt.prompt();
};

// SW
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
