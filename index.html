<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YmlAnime</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #111;
  color: #fff;
}
.header {
  display: flex;
  align-items: center;
  padding: 10px;
  background: #222;
  position: sticky;
  top: 0;
  z-index: 999;
}
.header .icon {
  margin: 0 10px;
  cursor: pointer;
}
.search-box {
  flex: 1;
  display: flex;
  margin-left: 10px;
}
.search-box input {
  width: 100%;
  padding: 5px 10px;
  border-radius: 4px;
  border: none;
}
.section {
  padding: 20px 10px;
}
.section-header {
  font-size: 1.2em;
  margin-bottom: 10px;
}
.hero {
  position: relative;
  height: 300px;
  background-size: cover;
  background-position: center;
  margin-bottom: 20px;
  border-radius: 8px;
  overflow: hidden;
}
.hero-content {
  position: absolute;
  bottom: 20px;
  left: 20px;
}
.hero h2 {
  font-size: 2em;
  margin: 0;
}
.hero button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.scroll-row {
  display: flex;
  overflow-x: auto;
  padding-bottom: 10px;
}
.poster {
  flex: 0 0 auto;
  width: 150px;
  margin-right: 10px;
  background: #222;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}
.poster img {
  width: 100%;
  display: block;
}
.poster .info {
  padding: 5px;
  font-size: 0.9em;
}
.poster .heart {
  position: absolute;
  top: 5px;
  right: 5px;
  font-size: 1.2em;
  cursor: pointer;
}
.poster .badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: rgba(0,0,0,0.7);
  padding: 2px 4px;
  font-size: 0.7em;
  border-radius: 3px;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="header">
  <div class="icon" id="home-btn" title="Home">🏠</div>
  <div class="icon" id="wishlist-btn" title="Wishlist">❤️</div>
  <div class="icon" id="genres-btn" title="Genres">🎞️</div>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="YmlAnime..." />
  </div>
  <div class="icon" id="profile-btn" title="Profile">👤</div>
</div>

<!-- Hero section -->
<div class="hero" id="hero" style="background-image: url('https://images.alphacoders.com/123/12345.jpg');">
  <div class="hero-content">
    <h2 id="hero-title">BEYOND JOURNEY'S END</h2>
    <button id="stream-now">STREAM NOW</button>
    <button id="trailer-btn">TRAILER</button>
  </div>
</div>

<!-- Sections -->
<div class="section" id="trending">
  <div class="section-header">TRENDING NOW</div>
  <div class="scroll-row" id="trending-row"></div>
</div>
<div class="section" id="top-rated">
  <div class="section-header">TOP RATED</div>
  <div class="scroll-row" id="top-rated-row"></div>
</div>
<div class="section" id="now-playing">
  <div class="section-header">NOW PLAYING</div>
  <div class="scroll-row" id="now-playing-row"></div>
</div>
<div class="section" id="most-popular">
  <div class="section-header">MOST POPULAR</div>
  <div class="scroll-row" id="most-popular-row"></div>
</div>
<div class="section" id="upcoming">
  <div class="section-header">UPCOMING</div>
  <div class="scroll-row" id="upcoming-row"></div>
</div>

<!-- Modal for trailer -->
<div id="trailer-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; align-items:center; justify-content:center; z-index:9999;">
  <video id="trailer-video" controls autoplay style="width:80%; max-height:80%;"></video>
  <button style="position:absolute; top:10px; right:20px; padding:10px; background:#fff; border:none; border-radius:4px; cursor:pointer;" id="close-trailer">Close</button>
</div>

<script>
const shows = [
  {
    id: 1,
    title: "Attack on Titan",
    episodes: 75,
    rating: 9.0,
    backgroundUrl: "https://images.alphacoders.com/123/12345.jpg",
    trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
    category: "Trending"
  },
  {
    id: 2,
    title: "My Hero Academia",
    episodes: 88,
    rating: 8.5,
    backgroundUrl: "https://images.alphacoders.com/543/54321.jpg",
    trailer: "https://www.w3schools.com/html/movie.mp4",
    category: "Top Rated"
  },
  {
    id: 3,
    title: "One Piece",
    episodes: 1000,
    rating: 9.2,
    backgroundUrl: "https://images.alphacoders.com/234/23456.jpg",
    trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
    category: "Most Popular"
  },
  {
    id: 4,
    title: "Demon Slayer",
    episodes: 26,
    rating: 8.9,
    backgroundUrl: "https://images.alphacoders.com/789/78910.jpg",
    trailer: "https://www.w3schools.com/html/movie.mp4",
    category: "Trending"
  },
  {
    id: 5,
    title: "Gintama",
    episodes: 367,
    rating: 8.7,
    backgroundUrl: "https://images.alphacoders.com/321/32167.jpg",
    trailer: "https://www.w3schools.com/html/mov_bbb.mp4",
    category: "Top Rated"
  },
  // Add more shows as needed
];

// populate background with most rated show
const hero = document.getElementById("hero");
const heroTitle = document.getElementById("hero-title");
const backgroundShow = shows.reduce((prev, curr) => prev.rating > curr.rating ? prev : curr);
hero.style.backgroundImage = `url('${backgroundShow.backgroundUrl}')`;
heroTitle.innerText = backgroundShow.title;

const categories = {
  "Trending": [],
  "Top Rated": [],
  "Most Popular": [],
  "Now Playing": [],
  "Upcoming": []
};

// Distribute shows into categories
shows.forEach(s => {
  if (categories[s.category]) {
    categories[s.category].push(s);
  }
});

// Function to load shows into categories
function loadCategory(category, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  categories[category].forEach(show => {
    const div = document.createElement("div");
    div.className = "poster";
    div.innerHTML = `
      <img src="${show.backgroundUrl}" />
      <div class="heart">🤍</div>
      <div class="badge">N/A</div>
      <div class="info">
        <div>Eps: ${show.episodes}</div>
        <div>Rating: ${show.rating}</div>
      </div>
      <div style="padding:2px;">${show.title}</div>
    `;
    // toggle wishlist
    div.querySelector('.heart').onclick = (e) => {
      e.stopPropagation();
      // toggle heart
      if (div.querySelector('.heart').innerText === '🤍') {
        div.querySelector('.heart').innerText = '❤️';
      } else {
        div.querySelector('.heart').innerText = '🤍';
      }
    };
    // click to watch trailer
    div.onclick = () => {
      playTrailer(show.trailer);
    };
    container.appendChild(div);
  });
}

// Load all categories
loadCategory("Trending", "trending-row");
loadCategory("Top Rated", "top-rated-row");
loadCategory("Most Popular", "most-popular-row");
loadCategory("Now Playing", "now-playing-row");
loadCategory("Upcoming", "upcoming-row");

// Trailer modal
function playTrailer(src) {
  document.getElementById('trailer-video').src = src;
  document.getElementById('trailer-modal').style.display = 'flex';
}
document.getElementById('close-trailer').onclick = () => {
  document.getElementById('trailer-modal').style.display = 'none';
}

// Search filter
document.getElementById('search-input').oninput = () => {
  const q = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('.poster').forEach(p => {
    if (p.innerText.toLowerCase().includes(q)) {
      p.style.display = 'block';
    } else {
      p.style.display = 'none';
    }
  });
}

// Buttons
document.getElementById('stream-now').onclick = () => {
  alert("Stream feature coming soon");
};
document.getElementById('trailer-btn').onclick = () => {
  alert("Trailer feature coming soon");
};
</script>
</body>
</html>
