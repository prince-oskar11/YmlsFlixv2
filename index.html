<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JUIXY - Juice & Dessert App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0; padding:0;
    background-color: #f5deb3; /* beige background for entire app */
  }
  /* Header styles */
  #header {
    background-color: #f5deb3; /* beige background for JUIXY title background */
    padding: 20px;
    text-align: center;
    position: relative;
  }
  #header h1 {
    margin: 0;
    font-size: 36px;
    color: green; /* JUIXY in green */
  }
  /* Install App button positioned at top-left of header */
  #installButton {
    position: absolute;
    top: 10px;
    left: 20px;
    padding: 8px 12px;
    background-color: #4CAF50;
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
  }
  #installButton:hover {
    background-color: #45a049;
  }
  /* Top buttons container (right side) */
  #topButtons {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex; gap: 10px;
  }
  #topButtons button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  #clearBtn { background-color: #f44336; color: white; }
  /* Navigation styles */
  #nav {
    display: flex; justify-content: center; gap: 15px; margin-top: 10px; background:#e0e0e0; padding:10px 0;
  }
  #nav span {
    cursor: pointer; font-weight: bold; color: green; font-size: 18px; padding: 8px 12px; border-radius: 4px; transition: background 0.3s;
  }
  #nav span:hover { background-color: #c8e6c9; }
  /* Main content style */
  section {
    display: none;
    max-width: 800px; margin:20px auto; background: #fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  section.active { display: block; }
  /* Section headers in brown */
  h2 {
    color: brown;
    margin-top: 0;
  }
  /* Items list styles */
  .item { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .itemName { flex: 1; font-size: 16px; }
  /* Buttons for item management */
  .manageButtons button {
    margin: 0 5px;
    padding: 4px 8px;
    border: none;
    border-radius: 4px;
    cursor:pointer;
    background-color: #4CAF50;
    color: white;
    font-weight: bold;
  }
  .manageButtons button:hover { background-color: #45a049; }

  /* Delete button style */
  .deleteBtn {
    background-color: #f44336; /* red */
    color: white;
    padding: 2px 6px;
    border: none;
    border-radius: 50%;
    font-weight: bold;
    margin-left: 10px;
    cursor: pointer;
  }
  /* Add item input styles */
  .addSection {
    margin-bottom: 15px;
  }
  .addSection input {
    padding: 8px; width: 200px; margin-right: 10px; border: 1px solid #ccc; border-radius:4px;
  }
  .addSection button {
    padding: 8px 12px; background-color: #2196F3; color: white; border: none; border-radius:4px; cursor:pointer;
  }
  .addSection button:hover { background-color: #0b7dda; }
</style>
</head>
<body>
<!-- Header with "JUIXY" and "Install App" button at top left, and other buttons at top right -->
<div id="header">
  <h1 style="margin:0;">JUIXY</h1>
  <button id="installButton" onclick="alert('Install app as a shortcut or PWA')">Install App</button>
  <div id="topButtons" style="position:absolute; top:20px; right:20px;">
    <button id="clearBtn" onclick="resetCounts()">Clear Counts</button>
  </div>
</div>

<!-- Navigation menu -->
<div id="nav">
  <span onclick="showSection('Juice')">Juice</span>
  <span onclick="showSection('Milk-Cake')">Milk-Cake</span>
  <span onclick="showSection('Tiramisu')">Tiramisu</span>
  <span onclick="showSection('Matcha')">Matcha</span>
  <span onclick="showSection('Mojito')">Mojito</span>
  <span onclick="showSection('Sandwich')">Sandwich</span>
  <span style="cursor:pointer; font-weight:bold; color:green;" onclick="showSection('TopSaler')">Top Seller</span>
</div>

<!-- Main categories -->
<section id="Juice" class="active">
  <h2>Add New Juice</h2>
  <div class="addSection">
    <input type="text" id="juiceInput" placeholder="Enter juice name" />
    <button onclick="addItem('Juice', 'juiceInput')">Add Juice</button>
  </div>
  <h3>Juice List</h3>
  <div id="itemsContainer_Juice"></div>
</section>

<section id="Milk-Cake">
  <h2>Add New Milk-Cake</h2>
  <div class="addSection">
    <input type="text" id="milkCakeInput" placeholder="Enter Milk-Cake name" />
    <button onclick="addItem('Milk-Cake', 'milkCakeInput')">Add Milk-Cake</button>
  </div>
  <h3>Milk-Cake List</h3>
  <div id="itemsContainer_Milk-Cake"></div>
</section>

<section id="Tiramisu">
  <h2>Add New Tiramisu</h2>
  <div class="addSection">
    <input type="text" id="tiramisuInput" placeholder="Enter Tiramisu name" />
    <button onclick="addItem('Tiramisu', 'tiramisuInput')">Add Tiramisu</button>
  </div>
  <h3>Tiramisu List</h3>
  <div id="itemsContainer_Tiramisu"></div>
</section>

<section id="Matcha">
  <h2>Add New Matcha</h2>
  <div class="addSection">
    <input type="text" id="matchaInput" placeholder="Enter Matcha name" />
    <button onclick="addItem('Matcha', 'matchaInput')">Add Matcha</button>
  </div>
  <h3>Matcha List</h3>
  <div id="itemsContainer_Matcha"></div>
</section>

<section id="Mojito">
  <h2>Add New Mojito</h2>
  <div class="addSection">
    <input type="text" id="mojitoInput" placeholder="Enter Mojito name" />
    <button onclick="addItem('Mojito', 'mojitoInput')">Add Mojito</button>
  </div>
  <h3>Mojito List</h3>
  <div id="itemsContainer_Mojito"></div>
</section>

<section id="Sandwich">
  <h2>Add New Sandwich</h2>
  <div class="addSection">
    <input type="text" id="sandwichInput" placeholder="Enter Sandwich name" />
    <button onclick="addItem('Sandwich', 'sandwichInput')">Add Sandwich</button>
  </div>
  <h3>Sandwich List</h3>
  <div id="itemsContainer_Sandwich"></div>
</section>

<!-- Top Seller Page -->
<section id="TopSaler">
  <h2>Top Seller</h2>
  <pre id="topSalerDetails" style="white-space: pre-wrap;"></pre>
  <button onclick="showSection('Juice')">Back to Categories</button>
</section>

<script>
  // Data initialization
  let dataSections = {
    'Juice': {},
    'Milk-Cake': {},
    'Tiramisu': {},
    'Matcha': {},
    'Mojito': {},
    'Sandwich': {}
  };
  let storage = localStorage.getItem('data') ? JSON.parse(localStorage.getItem('data')) : {};

  // Load data
  for (let key in dataSections) {
    dataSections[key] = JSON.parse(localStorage.getItem(key)) || {};
  }

  // Save data
  function saveData() {
    for (let sec in dataSections) {
      localStorage.setItem(sec, JSON.stringify(dataSections[sec]));
    }
  }

  // Show sections
  function showSection(id) {
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('#stockPage, #TopSaler').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Add item
  function addItem(section, inputId) {
    const name = document.getElementById(inputId).value.trim();
    if (!name || dataSections[section][name]) {
      alert('Invalid or duplicate name');
      return;
    }
    dataSections[section][name] = 0;
    document.getElementById(inputId).value = '';
    displayItems(section);
    saveData();
  }

  // Display items
  function displayItems(section) {
    const container = document.getElementById('itemsContainer_' + section);
    if (!container) return;
    container.innerHTML = '';
    for (const name in dataSections[section]) {
      const div = document.createElement('div');
      div.className = 'item';

      const n = document.createElement('span');
      n.className = 'itemName';
      n.innerText = name;

      // Buttons for item management
      const btnDiv = document.createElement('div');
      btnDiv.className = 'manageButtons';

      const minusBtn = document.createElement('button');
      minusBtn.innerText = '-';
      minusBtn.onclick = () => { if (dataSections[section][name] > 0) { dataSections[section][name]--; displayItems(section); } };

      const countSpan = document.createElement('span');
      countSpan.innerText = dataSections[section][name];

      const plusBtn = document.createElement('button');
      plusBtn.innerText = '+';
      plusBtn.onclick = () => { dataSections[section][name]++; displayItems(section); };

      // delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.innerText = 'X';
      deleteBtn.className = 'deleteBtn';
      deleteBtn.onclick = () => {
        if (confirm('Delete "' + name + '"?')) {
          delete dataSections[section][name];
          delete localStorage['data'][name]; // Not needed, just delete from data
          displayItems(section);
          saveData();
        }
      };

      btnDiv.appendChild(minusBtn);
      btnDiv.appendChild(countSpan);
      btnDiv.appendChild(plusBtn);
      btnDiv.appendChild(deleteBtn);

      div.appendChild(n);
      div.appendChild(btnDiv);
      container.appendChild(div);
    }
  }

  // Load all categories
  for (let section in dataSections) {
    displayItems(section);
  }

  // Show Top Seller
  function showTopSaler() {
    let totalSales = {};
    for (let section in dataSections) {
      for (const name in dataSections[section]) {
        totalSales[name] = (totalSales[name] || 0) + dataSections[section][name];
      }
    }
    const sortedItems = Object.entries(totalSales).sort((a, b) => b[1] - a[1]);
    let displayText = 'Items sold (highest to lowest):\n';
    for (const [name, count] of sortedItems) {
      displayText += `${name}: ${count}\n`;
    }
    document.getElementById('topSalerDetails').innerText = displayText;
    showSection('TopSaler');
  }

  // Clear counts
  function resetCounts() {
    if (confirm('Are you sure you want to reset all counts to zero?')) {
      for (let section in dataSections) {
        for (let item in dataSections[section]) {
          dataSections[section][item] = 0;
        }
        displayItems(section);
      }
      saveData();
    }
  }
</script>
</body>
</html>
